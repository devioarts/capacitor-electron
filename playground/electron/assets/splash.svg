<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="280" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="200" cy="120" r="70" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="120" r="55" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.2"/>

  <!-- electron orbit lines -->
  <ellipse cx="200" cy="120" rx="62" ry="22" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="200" cy="120" rx="62" ry="22" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"
    transform="rotate(60 200 120)"/>
  <ellipse cx="200" cy="120" rx="62" ry="22" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"
    transform="rotate(120 200 120)"/>

  <!-- center dot -->
  <circle cx="200" cy="120" r="7" fill="url(#ring)"/>

  <!-- orbit dots -->
  <circle cx="262" cy="120" r="4" fill="#6366f1"/>
  <circle cx="169" cy="103" r="4" fill="#6366f1" transform="rotate(60 200 120)"/>
  <circle cx="169" cy="103" r="4" fill="#06b6d4" transform="rotate(120 200 120)"/>

  <!-- title -->
  <text x="200" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" letter-spacing="1" fill="white">cap-electron</text>

  <!-- subtitle -->
  <text x="200" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#94a3b8" letter-spacing="2">PLAYGROUND</text>
</svg>
